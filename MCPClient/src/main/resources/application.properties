server.port=8080
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.base-url=https://api.openai.com
spring.ai.model=gpt-5-mini
spring.mcp.server-url=http://localhost:8081
spring.ai.mcp.client.sse.connections.barber-mcp-server.url=http://localhost:8081

# Spring AI core logging
logging.level.org.springframework.ai=DEBUG

# OpenAI client logging (requests/responses)
logging.level.org.springframework.ai.openai=DEBUG

# Advisors (RAG) logging
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# Vector store operations
logging.level.org.springframework.ai.vectorstore=DEBUG

# Function calling
logging.level.org.springframework.ai.chat.client=TRACE